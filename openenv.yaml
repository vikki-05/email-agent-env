name: customer-support-email-triage
description: >
  A deterministic AI agent environment for triaging customer support emails.
  The agent classifies incoming emails into one of five intent labels and is
  rewarded based on matching the predicted intent with the ground-truth label.

entry_point: inference.py

environment:
  class: EmailEnv
  module: env.environment

agent:
  model: gpt-4o-mini
  api_base_env: API_BASE_URL
  api_key_env: HF_TOKEN

action_space:
  type: discrete
  actions:
    - classify
    - reply
    - escalate
    - close

action_format:
  type: json
  schema:
    action_type:
      type: string
      enum:
        - classify
        - reply
        - escalate
        - close
    content:
      type: string

tasks:
  easy:
    description: >
      Handle a single customer email through the full triage workflow.
    num_emails: 1
    max_steps: 5
    timeout: 120

  medium:
    description: >
      Handle a single customer email with moderate complexity.
    num_emails: 1
    max_steps: 5
    timeout: 360

  hard:
    description: >
      Handle a single customer email that may require escalation.
    num_emails: 1
    max_steps: 5
    timeout: 720

logging:
  format: structured
  markers:
    start: "[START]"
    step: "[STEP]"
    end: "[END]"
  final_score_key: final_score

resources:
  max_cpu: 2
  max_memory_gb: 8
  max_runtime_minutes: 20

dependencies:
  python: "3.10"
  requirements_file: requirements.txt